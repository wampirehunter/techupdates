<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechUpdates | Skolar - Initializing</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --indigo: #4B0082; --electric: #6A5ACD; --dark: #0a0a0a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        
        /* Stealth Background Effect */
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; z-index: -1; }

        .container { z-index: 1; padding: 20px; }
        .logo-main { font-family: 'Rajdhani', sans-serif; font-size: 5rem; font-weight: 700; letter-spacing: 12px; color: white; margin: 0; text-transform: uppercase; }
        .logo-main span { color: var(--electric); }
        
        .status-bar { border: 1px solid #333; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; letter-spacing: 2px; color: var(--electric); display: inline-block; margin-bottom: 20px; text-transform: uppercase; }
        
        .tagline { font-size: 1.1rem; letter-spacing: 5px; color: #888; margin-top: 10px; text-transform: uppercase; }
        .description { max-width: 500px; margin: 30px auto; color: #666; font-weight: 300; line-height: 1.8; }

        .cta-btn { display: inline-block; padding: 15px 40px; border: 1px solid var(--electric); color: white; text-decoration: none; font-weight: 700; letter-spacing: 2px; border-radius: 2px; transition: 0.4s; text-transform: uppercase; }
        .cta-btn:hover { background: var(--electric); box-shadow: 0 0 30px rgba(106, 90, 205, 0.3); }

        .footer { position: absolute; bottom: 40px; font-size: 0.7rem; letter-spacing: 2px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">● System Initialization In Progress</div>
    <h1 class="logo-main">SKOL<span>AR</span></h1>
    <div class="tagline">The Engine of Education</div>
    
    <p class="description">
        TechUpdates is currently deploying a next-generation institutional architecture. 
        Engineered for high-performance connectivity. Built for absolute reliability.
    </p>

    <a href="mailto:admin@techupdates.co.in" class="cta-btn">Request Early Access</a>
</div>

<div class="footer">
    TEHUPDATES.CO.IN | STEALTH DEPLOYMENT PHASE 01
</div>

</body>
</html>
